services:
  - type: web
    name: learnhub-client
    runtime: node
    rootDir: client
    buildCommand: yarn && yarn build
    startCommand: yarn start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

  - type: web
    name: learnhub-server
    runtime: node
    rootDir: server
    buildCommand: yarn
    startCommand: node index.js
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://learnhub-three-beta.vercel.app
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
